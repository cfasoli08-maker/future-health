name: Daily Digest
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Fire Future Health daily digest
        run: |
          curl -s -L -X POST "https://script.google.com/macros/s/AKfycbwc-FLnsJThCFmynUFb4m3KN3P895I-wATyPOxoGK4lWnIpVw6WGYkbBc3lCzJDMOymGg/exec" -d '{"action":"run_digest"}' --max-time 120
